# https://wiki.hypr.land/Configuring/Monitors/
# To list all available monitors: hyprctl monitors all
# monitor = name, resolution, position, scale
# example:
#monitor = , preferred, auto, 1
monitor= ,2560x1440@165,0x0,1


$terminal = kitty
$fileManager = dolphin
$menu = fuzzel

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = waybar & hyprpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1


env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

env = GTK_THEME,Adwaita-dark
env = XCURSOR_THEME,Adwaita
env = XDG_MENU_PREFIX,arch-


general {
    gaps_in = 2
    gaps_out = 10

    border_size = 2

    col.active_border = rgb(79,195,247)
    col.inactive_border = rgba(00000000)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}    

decoration {
    rounding = 4
    rounding_power = 3

    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 4
        passes = 5
        vibrancy = 0

    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = slide,          0.25, 0.1,  0.25, 1

    animation = global,        1,     10,    default

    animation = border,        1,     6.5,   easeOutQuint
    animation = windows,       1,     6,     easeOutQuint
    animation = windowsIn,     1,     5.5,   easeOutQuint, popin 85%
    animation = windowsOut,    1,     2,     linear,       popin 85%

    animation = fadeIn,        1,     2.5,   almostLinear
    animation = fadeOut,       1,     2,     almostLinear
    animation = fade,          1,     4,     quick

    animation = layers,        1,     5,     easeOutQuint
    animation = layersIn,      1,     5,     easeOutQuint, fade
    animation = layersOut,     1,     2,     linear,       fade
    animation = fadeLayersIn,  1,     2.5,   almostLinear
    animation = fadeLayersOut, 1,     2,     almostLinear

    animation = workspaces,     1,     2,     default,        fade
    animation = workspacesIn,   1,     3,     default,        fade
    animation = workspacesOut,  1,     3,     default,        fade

    animation = zoomFactor,    1,     8,     quick
}
