general {
    hide_cursor = false
    ignore_empty_input = true
    fractional_scaling = 2
    text_trim = true
}

auth {
    pam:enabled = true
    pam:module = hyprlock
    pam:skip_session_lock = true
}

animations {
    enabled = true
    animation = fadeIn, 0, 0, default
    animation = fadeOut, 0, 0, default
    animation = inputFieldColors, 1, 3, default
    animation = inputFieldFade, 1, 3, default
    animation = inputFieldDots, 1, 3, default
}

background {
    monitor =
    blur_passes = 2
    blur_size = 5
    noise = 0.0
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = $TIME
    color = rgba(79, 195, 247, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(224, 224, 224, 1.0)
    font_size = 30
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 380, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(79, 195, 247, 1.0)
    inner_color = rgba(0, 20, 29, 0.9)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Введите пароль...</i>
    hide_input = false
    fail_text = Неверный пароль
    check_color = rgba(79, 195, 247, 1.0)
    fail_color = rgba(207, 102, 121, 1.0)
    position = 0, -150
    halign = center
    valign = center
    shadow_passes = 0
    rounding = 16
}

label {
    monitor =
    text = $FAIL
    color = rgba(207, 102, 121, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -230
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] echo "$(uptime -p | sed 's/up //' | sed 's/ minutes/мин/' | sed 's/ hours/ч/' | sed 's/ days/д/')"
    color = rgba(79, 195, 247, 0.7)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 20, 20
    halign = left
    valign = bottom
}
