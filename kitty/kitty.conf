font_family      JetBrainsMono Nerd Font
font_size        12.0
hide_window_decorations yes
scrollback_lines 10000

background_opacity 0.75
background_blur 16

foreground #e2e8f0
background #0f1117

color0 #1e222a
color8 #4a5568

color1 #ff6b6b
color9 #ff8787

color2 #6bdb8b
color10 #8ce8a8

color3 #f9c74f
color11 #fde48c

color4 #70a9ff
color12 #91bcff

color5 #d48aff
color13 #e2b3ff

color6 #6dd5ed
color14 #9ee8ff

color7 #d4d8e2
color15 #ffffff

cursor #e2e8f0
cursor_text_color #0f1117

selection_foreground #0f1117
selection_background #e2e8f0

cursor_shape beam
cursor_blink_interval 0.5
cursorline yes
cursorline_color #2a3142

cursor_trail 3
cursor_trail_decay 0.05 0.15
tab_bar_style powerline
tab_powerline_style round

active_tab_foreground #0f1117
active_tab_background #d48aff
inactive_tab_foreground #a0a8b8
inactive_tab_background #1a1f2c

visual_bell_duration 0.0
enable_audio_bell no

mouse_map left click grab, clear_selection
mouse_map ctrl+left click, clear_selection
mouse_hide_wait 2.0

#shell zsh
